<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тетрадь: Коран и Инструменты</title>
    <link href="https://fonts.googleapis.com/css2?family=Marck+Script&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-color: #fdfbf7;
            --line-color: #a2c2e6;
            --margin-line: #ff9da4;
            --ink-color: #2c3e50;
            --dark-gray: #4a4a4a;
            --cell-size: 25px;
            --left-margin: calc(var(--cell-size) + 2mm);
            --right-margin: 2mm;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #222;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Marck Script', cursive;
            overflow: hidden;
        }

        .notebook {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            background-color: var(--paper-color);
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            overflow: hidden;
            background-image: 
                linear-gradient(var(--line-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--line-color) 1px, transparent 1px);
            background-size: var(--cell-size) var(--cell-size);
        }

        .notebook::before {
            content: '';
            position: absolute;
            top: 0;
            left: var(--cell-size);
            width: 3px;
            height: 100%;
            background-color: var(--margin-line);
            z-index: 1;
        }

        .divider-line {
            position: absolute;
            top: calc(var(--cell-size) * 4);
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--dark-gray);
            z-index: 2;
        }

        .header-title {
            position: absolute;
            top: 10px;
            left: var(--left-margin);
            right: var(--right-margin);
            font-size: 2rem;
            color: var(--ink-color);
            z-index: 3;
        }

        .signature-bottom {
            position: absolute;
            bottom: 8px;
            right: 20px;
            font-size: 0.9rem;
            color: #95a5a6;
            font-family: monospace;
            z-index: 5;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            user-select: none;
        }
        .signature-bottom:hover {
            opacity: 1;
            color: var(--ink-color);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--ink-color);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1.3rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            opacity: 0;
            transition: 0.3s;
            z-index: 1000;
            font-family: 'Marck Script', cursive;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .content-wrapper {
            position: absolute;
            top: calc(var(--cell-size) * 4 + 20px);
            left: var(--left-margin);
            right: var(--right-margin);
            bottom: 40px;
            overflow-y: auto;
            padding: 10px 0;
            z-index: 10;
        }

        .section-card {
            background: transparent;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px dashed var(--line-color);
            opacity: 0;
            transform: translateY(20px);
            transition: 0.4s;
            width: 100%;
        }
        .section-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px dashed var(--margin-line);
            padding-bottom: 10px;
        }
        .card-header h3 {
            font-size: 1.8rem;
            color: var(--ink-color);
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .notebook-btn {
            background: transparent;
            border: 2px solid var(--ink-color);
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 1.1rem;
            font-family: 'Marck Script', cursive;
            color: var(--ink-color);
            cursor: pointer;
            transition: 0.2s;
        }
        .notebook-btn:hover {
            background: var(--ink-color);
            color: white;
        }
        .notebook-btn.small {
            padding: 4px 12px;
            font-size: 1rem;
        }

        .input-area {
            font-size: 1.5rem;
            color: var(--ink-color);
            outline: none;
            border: none;
            background: transparent;
            width: 100%;
            min-height: 80px;
            resize: vertical;
            font-family: 'Marck Script', cursive;
            margin-top: 10px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
        }

        .quran-arabic {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            color: #000;
            direction: rtl;
            line-height: 2.8;
            text-align: right;
            margin-bottom: 15px;
            word-wrap: break-word;
        }
        .quran-translation {
            font-size: 1.5rem;
            color: var(--ink-color);
            line-height: 1.8;
            margin-bottom: 10px;
        }
        .quran-ref {
            font-size: 1.2rem;
            color: #95a5a6;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 2px dashed var(--line-color);
        }
        .tafsir-block {
            background: rgba(255,255,240,0.3);
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            border-right: 5px solid var(--margin-line);
            font-family: 'Amiri', serif;
            direction: rtl;
            font-size: 1.4rem;
        }

        canvas {
            display: block;
            width: 100%;
            height: 250px;
            background: transparent;
            border-radius: 10px;
            border: 2px solid var(--line-color);
            cursor: crosshair;
            touch-action: none;
        }

        .favorite-item {
            background: rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid gold;
            font-family: 'Amiri', serif;
            font-size: 1.3rem;
        }

        .word-item {
            background: rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--line-color);
            font-family: 'Amiri', serif;
            font-size: 1.3rem;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            font-size: 1.2rem;
        }
        .calendar-day {
            background: rgba(255,255,255,0.2);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }
        .today {
            background: var(--margin-line);
            color: white;
        }

        .notepad-area {
            width: 100%;
            min-height: 200px;
            background: rgba(255,255,255,0.2);
            border: 2px dashed var(--line-color);
            border-radius: 15px;
            padding: 15px;
            font-size: 1.3rem;
            font-family: 'Marck Script', cursive;
        }

        .safe-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }
        .safe-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .safe-dialog {
            background: var(--paper-color);
            padding: 30px;
            border-radius: 30px;
            max-width: 500px;
            width: 90%;
            border: 5px solid var(--ink-color);
        }
        .safe-dialog input, .safe-dialog textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid var(--line-color);
            border-radius: 15px;
            font-size: 1.2rem;
            font-family: 'Marck Script', cursive;
            background: rgba(255,255,255,0.3);
        }

        .loader {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid #ccc;
            border-top-color: var(--ink-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    </style>
</head>
<body>
<div class="notebook">
    <div class="header-title">📔 Тетрадь: Коран, Тафсир, Слова</div>
    <div class="divider-line"></div>

    <div class="content-wrapper" id="contentWrapper">
        <div id="resultArea"></div>
        <hr style="border-top:3px solid var(--dark-gray); margin:20px 0;">
        <textarea class="input-area" id="userInput" placeholder="Введите: арабский текст, сура:аят (2:255), сура-число (2-100), Карточки, Слово ..., Избранное, Доска, Время Город, Долг, Календарь, Блокнот, Обновление, HTML" spellcheck="false" autofocus></textarea>
    </div>

    <div class="signature-bottom" id="signature">ani i329126</div>
</div>

<div id="toast" class="toast"></div>
<div id="safeOverlay" class="safe-overlay">
    <div class="safe-dialog">
        <h2 style="font-size:2rem;">🔐 Секретный сейф</h2>
        <input type="password" id="safePassword" placeholder="Пароль (8 цифр)">
        <textarea id="safeContent" placeholder="Секретные данные..." rows="5"></textarea>
        <div class="btn-group" style="justify-content:flex-end;">
            <button class="notebook-btn" id="safeSave">Сохранить</button>
            <button class="notebook-btn" id="safeClose">Закрыть</button>
        </div>
    </div>
</div>

<script>
(function() {
    const input = document.getElementById('userInput');
    const resultArea = document.getElementById('resultArea');
    const toast = document.getElementById('toast');
    const signature = document.getElementById('signature');
    const safeOverlay = document.getElementById('safeOverlay');
    const safePassword = document.getElementById('safePassword');
    const safeContent = document.getElementById('safeContent');
    const safeSave = document.getElementById('safeSave');
    const safeClose = document.getElementById('safeClose');

    let timeoutId = null;
    let safeClickCount = 0;

    // Хранилища
    const translationCache = new Map();
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    let savedWords = JSON.parse(localStorage.getItem('savedWords')) || [];
    let updateLinks = JSON.parse(localStorage.getItem('updateLinks')) || [];

    // Глобальные функции для onclick handlers
    window.saveWord = function(arabic, translation, surah, ayah) {
        savedWords.push({ arabic, translation, surah, ayah });
        localStorage.setItem('savedWords', JSON.stringify(savedWords));
        showToast('Слово сохранено');
    };

    window.removeSavedWord = function(i) {
        savedWords.splice(i, 1);
        localStorage.setItem('savedWords', JSON.stringify(savedWords));
        showSavedWords();
    };

    window.addToFavorites = function(arabic, translation, surah, ayah, surahName) {
        favorites.push({ arabic, translation, surah, ayah, surahName });
        localStorage.setItem('favorites', JSON.stringify(favorites));
        showToast('Добавлено в избранное');
    };

    window.removeFavorite = function(i) {
        favorites.splice(i, 1);
        localStorage.setItem('favorites', JSON.stringify(favorites));
        showFavorites();
    };

    window.loadAyah = function(surah, ayah) {
        fetchQuranWithTafsir(surah, ayah);
    };

    window.addLink = function() {
        let val = document.getElementById('newLink')?.value;
        if(val && val.startsWith('http')) { 
            updateLinks.push(val); 
            localStorage.setItem('updateLinks',JSON.stringify(updateLinks)); 
            showUpdates(); 
            showToast('Добавлено'); 
        } else showToast('Неверная ссылка');
    };

    window.removeLink = function(i) { 
        updateLinks.splice(i,1); 
        localStorage.setItem('updateLinks',JSON.stringify(updateLinks)); 
        showUpdates(); 
    };

    function showToast(text) {
        toast.textContent = text;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function showLoader(msg) {
        resultArea.innerHTML = `<div class="section-card show"><div style="display:flex; gap:15px;"><span class="loader"></span><span style="font-size:1.8rem;">${msg}...</span></div></div>`;
    }

    function showError(msg) {
        resultArea.innerHTML = `<div class="section-card show" style="border-left:8px solid #c0392b;">❌ ${msg}</div>`;
    }

    function showCard(html) {
        resultArea.innerHTML = html;
    }

    function copyHTML() {
        const html = document.documentElement.outerHTML;
        const textarea = document.createElement('textarea');
        textarea.value = html;
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            showToast('✓ HTML скопирован');
        } catch (err) {
            showToast('❌ Ошибка копирования');
        }
        document.body.removeChild(textarea);
    }

    // ========== ПОИСК СЛОВ В СУРЕ ==========
    async function searchWordsInSurah(surah, count) {
        showLoader(`Ищем ${count} слов в суре ${surah}`);
        try {
            const url = `https://api.alquran.cloud/v1/surah/${surah}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.code === 200) {
                const ayahs = data.data.ayahs;
                let allWords = [];
                for (let ayah of ayahs) {
                    const words = ayah.text.split(' ').filter(w => w.trim() !== '');
                    allWords.push(...words.map(w => ({ 
                        word: w, 
                        surah: surah, 
                        ayah: ayah.numberInSurah,
                        surahName: data.data.englishName
                    })));
                }
                const selected = allWords.slice(0, count);
                let html = `<div class="section-card show"><div class="card-header"><h3>📊 Сура ${surah} (${data.data.englishName}): первые ${count} слов</h3></div>`;
                
                for (let item of selected) {
                    let translation = '...';
                    try {
                        const transUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(item.word)}&langpair=ar|ru`;
                        const transRes = await fetch(transUrl);
                        const transData = await transRes.json();
                        if (transData.responseStatus === 200) {
                            translation = transData.responseData.translatedText;
                        }
                    } catch (e) {}
                    
                    // Экранирование для onclick
                    const safeWord = item.word.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const safeTrans = translation.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                    html += `
                        <div class="word-item">
                            <div style="flex:1;">
                                <span style="font-family:'Amiri'; font-size:1.8rem;">${item.word}</span>
                                <span style="font-size:1.2rem; margin-left:10px;">(${item.surah}:${item.ayah})</span>
                                <div style="font-size:1.3rem; color:var(--ink-color);">${translation}</div>
                            </div>
                            <button class="notebook-btn small" onclick="window.saveWord('${safeWord}', '${safeTrans}', ${item.surah}, ${item.ayah})">➕ Сохранить</button>
                        </div>
                    `;
                }
                html += `</div>`;
                showCard(html);
            } else {
                showError('Сура не найдена');
            }
        } catch (e) {
            showError('Ошибка загрузки суры');
        }
    }

    // Показать сохранённые слова
    function showSavedWords() {
        let html = `<div class="section-card show"><div class="card-header"><h3>📚 Сохранённые слова</h3></div>`;
        if (savedWords.length === 0) html += '<p>Нет сохранённых слов</p>';
        savedWords.forEach((w, i) => {
            html += `
                <div class="word-item">
                    <div style="flex:1;">
                        <span style="font-family:'Amiri'; font-size:1.8rem;">${w.arabic}</span>
                        <span style="font-size:1.2rem;">(${w.surah}:${w.ayah})</span>
                        <div>${w.translation}</div>
                    </div>
                    <button class="notebook-btn small" onclick="window.removeSavedWord(${i})">✖</button>
                </div>
            `;
        });
        html += '</div>';
        showCard(html);
    }

    // ========== АЯТ + ТАФСИР ==========
    async function fetchQuranWithTafsir(surah, ayah) {
        showLoader('Ищу аят и тафсир');
        try {
            const url = `https://api.alquran.cloud/v1/ayah/${surah}:${ayah}/editions/quran-uthmani,ru.abuadel`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.code === 200) {
                const arabicText = data.data[0].text;
                const russianText = data.data[1].text;
                const surahName = data.data[0].surah.englishName;
                const surahNameRu = data.data[0].surah.name;
                const ayahNum = data.data[0].numberInSurah;
                let tafsirText = '';
                try {
                    const tafsirUrl = `https://api.alquran.cloud/v1/ayah/${surah}:${ayah}/ar.jalalayn`;
                    const tafsirRes = await fetch(tafsirUrl);
                    const tafsirData = await tafsirRes.json();
                    if (tafsirData.code === 200) tafsirText = tafsirData.data.text;
                } catch { tafsirText = '(Тафсир временно недоступен)'; }

                // Экранирование
                const safeArabic = arabicText.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const safeRussian = russianText.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                showCard(`
                    <div class="section-card show">
                        <div class="card-header"><h3>📖 Аят и Тафсир</h3></div>
                        <div class="quran-arabic">${arabicText}</div>
                        <div class="quran-translation">${russianText}</div>
                        <div class="tafsir-block">📜 التفسير: ${tafsirText || 'нет'}</div>
                        <div class="quran-ref">Сура ${surahNameRu} (${surahName}), Аят ${ayahNum}</div>
                        <button class="notebook-btn small" onclick='window.addToFavorites("${safeArabic}", "${safeRussian}", ${surah}, ${ayahNum}, "${surahName}")'>⭐ В избранное</button>
                    </div>
                `);
            } else showError('Аят не найден');
        } catch { showError('Ошибка соединения'); }
    }

    // ========== ПЕРЕВОД ==========
    async function fetchTranslation(text) {
        showLoader('Перевожу');
        try {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=ar|ru`;
            const res = await fetch(url);
            const data = await res.json();
            let translation = '';
            if (data.responseStatus === 200) {
                translation = data.responseData.translatedText;
            } else {
                // Fallback
                const alt = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ar&tl=ru&dt=t&q=${encodeURIComponent(text)}`);
                const altData = await alt.json();
                translation = altData[0].map(i => i[0]).join('');
            }
            
            translationCache.set(text, translation);
            
            const safeText = text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            const safeTrans = translation.replace(/'/g, "\\'").replace(/"/g, '&quot;');

            showCard(`
                <div class="section-card show">
                    <div class="quran-arabic">${text}</div>
                    <div class="quran-translation">${translation}</div>
                    <button class="notebook-btn small" onclick='window.saveWord("${safeText}", "${safeTrans}", 0, 0)'>➕ Сохранить слово</button>
                </div>
            `);
        } catch { showError('Ошибка перевода'); }
    }

    // ========== ИЗБРАННОЕ ==========
    function showFavorites() {
        let html = `<div class="section-card show"><div class="card-header"><h3>⭐ Избранное</h3></div>`;
        if (favorites.length === 0) html += '<p>Пусто</p>';
        favorites.forEach((f, i) => {
            html += `
                <div class="favorite-item" style="cursor:pointer;" onclick='window.loadAyah(${f.surah}, ${f.ayah})'>
                    <div style="flex:1;">
                        <span style="font-family:'Amiri';">${f.arabic}</span>
                        <div>${f.translation}</div>
                        <small>${f.surahName || 'Сура ' + f.surah}:${f.ayah}</small>
                    </div>
                    <button class="notebook-btn small" onclick="event.stopPropagation(); window.removeFavorite(${i})">✖</button>
                </div>
            `;
        });
        html += '</div>';
        showCard(html);
    }

    // ========== ДОСКА ==========
    let canvasObj = null;
    let ctxObj = null;
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let currentColor = '#2c3e50';
    let currentWidth = 3;
    let undoStack = [];

    function showDrawingBoard() {
        showCard(`
            <div class="section-card show">
                <div class="card-header"><h3>🎨 Доска</h3></div>
                <div class="btn-group">
                    <button class="notebook-btn" id="penMode">🖊 Ручка</button>
                    <button class="notebook-btn" id="eraserMode">🧼 Ластик</button>
                    <button class="notebook-btn" id="clearCanvas">🗑 Очистить</button>
                    <button class="notebook-btn" id="undoCanvas">↩ Назад</button>
                </div>
                <canvas id="drawCanvas" width="800" height="300" style="width:100%; height:auto; background:transparent;"></canvas>
            </div>
        `);
        // Небольшая задержка чтобы DOM обновился
        setTimeout(initCanvasLogic, 50);
    }

    function initCanvasLogic() {
        const canvas = document.getElementById('drawCanvas');
        if (!canvas) return;
        
        canvasObj = canvas;
        ctxObj = canvas.getContext('2d');
        
        // Настройки контекста
        ctxObj.lineCap = 'round';
        ctxObj.lineJoin = 'round';
        ctxObj.strokeStyle = currentColor;
        ctxObj.lineWidth = currentWidth;

        // Обработчики событий
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseout', stopDraw);
        
        // Тач события
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        }, {passive: false});

        canvas.addEventListener('touchend', () => {
            const mouseEvent = new MouseEvent('mouseup', {});
            canvas.dispatchEvent(mouseEvent);
        });

        // Кнопки
        document.getElementById('penMode').addEventListener('click', () => { 
            currentColor = '#2c3e50'; 
            currentWidth = 3; 
            ctxObj.strokeStyle = currentColor;
            ctxObj.lineWidth = currentWidth;
        });
        document.getElementById('eraserMode').addEventListener('click', () => { 
            currentColor = '#fdfbf7'; 
            currentWidth = 15; 
            ctxObj.strokeStyle = currentColor;
            ctxObj.lineWidth = currentWidth;
        });
        document.getElementById('clearCanvas').addEventListener('click', () => { 
            ctxObj.clearRect(0, 0, canvas.width, canvas.height); 
            undoStack = []; 
        });
        document.getElementById('undoCanvas').addEventListener('click', () => { 
            if (undoStack.length > 0) {
                const img = new Image();
                img.src = undoStack.pop();
                img.onload = () => ctxObj.drawImage(img, 0, 0);
            }
        });
    }

    function getPos(e) {
        const rect = canvasObj.getBoundingClientRect();
        const scaleX = canvasObj.width / rect.width;
        const scaleY = canvasObj.height / rect.height;
        return {
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY
        };
    }

    function startDraw(e) {
        isDrawing = true;
        const pos = getPos(e);
        lastX = pos.x;
        lastY = pos.y;
        ctxObj.beginPath();
        ctxObj.moveTo(lastX, lastY);
        undoStack.push(canvasObj.toDataURL());
        if(undoStack.length > 10) undoStack.shift(); // Limit stack
    }

    function draw(e) {
        if (!isDrawing) return;
        const pos = getPos(e);
        ctxObj.lineTo(pos.x, pos.y);
        ctxObj.stroke();
        ctxObj.beginPath();
        ctxObj.moveTo(pos.x, pos.y);
        lastX = pos.x;
        lastY = pos.y;
    }

    function stopDraw() {
        isDrawing = false;
        ctxObj.beginPath();
    }

    // ========== ВРЕМЯ ==========
    async function showPrayerTimes(city) {
        showLoader('Загружаем время');
        try {
            const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=Russia&method=16`);
            const data = await res.json();
            if (data.code === 200) {
                const t = data.data.timings;
                const fajrParts = t.Fajr.split(':');
                let fajrMinutes = parseInt(fajrParts[0])*60 + parseInt(fajrParts[1]);
                let astroMinutes = fajrMinutes - 20;
                let astroHours = Math.floor(astroMinutes/60);
                let astroMins = astroMinutes % 60;
                let astronomicalFajr = `${astroHours.toString().padStart(2,'0')}:${astroMins.toString().padStart(2,'0')}`;

                showCard(`
                    <div class="section-card show">
                        <div class="card-header"><h3>🕌 Время намаза: ${city}</h3></div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:1.3rem;">
                            <div>🌌 Ложный рассвет (астрон.): ${astronomicalFajr}</div>
                            <div>🌅 Истинный рассвет (Фаджр): ${t.Fajr}</div>
                            <div>☀️ Восход: ${t.Sunrise}</div>
                            <div>🔆 Зенит: ${t.Dhuhr}</div>
                            <div>🌆 Аср: ${t.Asr}</div>
                            <div>🌇 Закат: ${t.Sunset}</div>
                            <div>🌃 Иша: ${t.Isha}</div>
                        </div>
                        <p style="margin-top:10px;">Метод: ДУМ РФ</p>
                    </div>
                `);
            } else showError('Город не найден');
        } catch { showError('Ошибка загрузки'); }
    }

    // ========== КАЛЕНДАРЬ ==========
    async function showHijri() {
        showLoader('Календарь');
        try {
            const today = new Date();
            const res = await fetch(`https://api.aladhan.com/v1/gToH?date=${today.getDate()}-${today.getMonth()+1}-${today.getFullYear()}`);
            const data = await res.json();
            if (data.code === 200) {
                const h = data.data.hijri;
                let days = '';
                const monthDays = 30; 
                for (let i = 1; i <= monthDays; i++) {
                    days += `<div class="calendar-day ${i == h.day ? 'today' : ''}">${i}</div>`;
                }
                showCard(`
                    <div class="section-card show">
                        <div class="card-header"><h3>📅 Календарь Хиджры</h3></div>
                        <div style="font-size:2rem; text-align:center;">${h.day} ${h.month.ar} ${h.year}</div>
                        <div style="font-size:1.3rem; text-align:center;">${h.weekday.ar}</div>
                        <div class="calendar-grid">${days}</div>
                    </div>
                `);
            } else showError('Ошибка загрузки календаря');
        } catch { showError('Ошибка соединения'); }
    }

    // ========== ОСТАЛЬНЫЕ РАЗДЕЛЫ ==========
    function showCards() {
        showCard(`<div class="section-card show"><div class="card-header"><h3>🃏 Карточки</h3></div><p>Раздел в разработке.</p></div>`);
    }

    function showWordSearch(word) {
        showCard(`<div class="section-card show"><div class="card-header"><h3>🔍 Поиск: ${word}</h3></div><p>Введите сура-число для поиска слов, например 2-100</p></div>`);
    }

    function showDebt() {
        showCard(`
            <div class="section-card show"><div class="card-header"><h3>💰 Долги</h3></div>
            <textarea class="notepad-area" id="debtText">${localStorage.getItem('debt')||''}</textarea>
            <button class="notebook-btn" onclick="localStorage.setItem('debt',document.getElementById('debtText').value);showToast('Сохранено')">Сохранить</button></div>
        `);
    }

    function showNotepad() {
        showCard(`
            <div class="section-card show"><div class="card-header"><h3>📒 Блокнот</h3></div>
            <textarea class="notepad-area" id="notepadText">${localStorage.getItem('notepad')||''}</textarea>
            <button class="notebook-btn" onclick="localStorage.setItem('notepad',document.getElementById('notepadText').value);showToast('Сохранено')">Сохранить</button></div>
        `);
    }

    function showUpdates() {
        let linksHtml = updateLinks.map((l,i)=>`<div>🔗 <a href="${l}" target="_blank">${l}</a> <button class="notebook-btn small" onclick="window.removeLink(${i})">✖</button></div>`).join('');
        showCard(`
            <div class="section-card show"><div class="card-header"><h3>🔄 Обновления</h3></div>
            ${linksHtml||'<p>Нет ссылок</p>'}
            <div style="display:flex; gap:10px; margin-top:15px;">
                <input id="newLink" placeholder="https://..." style="flex:1; padding:8px; border-radius:20px; border:2px solid var(--line-color); background:transparent;">
                <button class="notebook-btn" onclick="window.addLink()">➕ Добавить</button>
            </div></div>
        `);
    }

    // ========== ОБРАБОТКА ВВОДА ==========
    input.addEventListener('input', (e) => {
        const text = e.target.value.trim();
        if (timeoutId) clearTimeout(timeoutId);

        if (/html/i.test(text)) { copyHTML(); return; }

        const lower = text.toLowerCase();
        if (lower === 'карточки') { showCards(); return; }
        if (lower.startsWith('слово ')) { showWordSearch(text.slice(6)); return; }
        if (lower === 'избранное') { showFavorites(); return; }
        if (lower === 'доска') { showDrawingBoard(); return; }
        if (lower.startsWith('время ')) { showPrayerTimes(text.slice(6) || 'Махачкала'); return; }
        if (lower === 'долг') { showDebt(); return; }
        if (lower === 'календарь') { showHijri(); return; }
        if (lower === 'блокнот') { showNotepad(); return; }
        if (lower === 'обновление') { showUpdates(); return; }
        if (lower === 'слова') { showSavedWords(); return; }
        if (lower.startsWith('ссылка + ')) {
            let link = text.slice(9);
            if(link.startsWith('http')) { 
                updateLinks.push(link); 
                localStorage.setItem('updateLinks',JSON.stringify(updateLinks)); 
                showToast('Добавлено'); 
            }
            return;
        }
        if (lower.startsWith('ссылка - ')) {
            let link = text.slice(9);
            updateLinks = updateLinks.filter(l => l !== link);
            localStorage.setItem('updateLinks',JSON.stringify(updateLinks));
            showToast('Удалено');
            return;
        }

        const dashPattern = /^(\d{1,3})-(\d+)$/;
        const dashMatch = text.match(dashPattern);
        if (dashMatch) {
            searchWordsInSurah(dashMatch[1], parseInt(dashMatch[2]));
            return;
        }

        const colonPattern = /^(\d{1,3}):(\d{1,3})$/;
        const colonMatch = text.match(colonPattern);
        if (colonMatch) {
            fetchQuranWithTafsir(colonMatch[1], colonMatch[2]);
            return;
        }

        const arabicPattern = /[\u0600-\u06FF]/;
        if (arabicPattern.test(text)) {
            if (translationCache.has(text)) {
                const safeText = text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const safeTrans = translationCache.get(text).replace(/'/g, "\\'").replace(/"/g, '&quot;');
                showCard(`
                    <div class="section-card show">
                        <div class="quran-arabic">${text}</div>
                        <div class="quran-translation">${translationCache.get(text)}</div>
                        <button class="notebook-btn small" onclick='window.saveWord("${safeText}", "${safeTrans}", 0, 0)'>➕ Сохранить слово</button>
                    </div>
                `);
            } else {
                fetchTranslation(text);
            }
            return;
        }

        if (text.length > 0) {
            showCard(`<div class="section-card show">❓ Неизвестная команда. Попробуйте: 2:255, 2-100, время махачкала, календарь, слова</div>`);
        } else {
            resultArea.innerHTML = '';
        }
    });

    // ========== СЕКРЕТНЫЙ СЕЙФ ==========
    signature.addEventListener('click', () => {
        safeClickCount++;
        if (safeClickCount === 3) {
            safeOverlay.classList.add('show');
            safeContent.value = localStorage.getItem('safeData') || '';
            safePassword.value = '';
            safeClickCount = 0;
        }
        setTimeout(() => safeClickCount = 0, 1000);
    });

    safeSave.addEventListener('click', () => {
        if (safePassword.value === '88888888') {
            localStorage.setItem('safeData', safeContent.value);
            showToast('Сейф сохранён');
            safeOverlay.classList.remove('show');
        } else showToast('Неверный пароль');
    });

    safeClose.addEventListener('click', () => safeOverlay.classList.remove('show'));

    window.onload = () => {
        resultArea.innerHTML = `<div class="section-card show" style="text-align:center;">📓 Введите команду. Примеры: 2:255, 2-100, время махачкала, календарь, слова</div>`;
    };
})();
</script>
